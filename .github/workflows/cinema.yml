name: cinema
on:
  push:
    branches: [ "main" ]

jobs:
    absent:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: absent
          run: |
            npm install
            timeout 324m node cinema.js
  
