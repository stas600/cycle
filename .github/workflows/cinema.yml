name: cinema
on:
  push:
    branches: [ "main" ]

jobs:
    triumphantly_closely_carelessly:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: triumphantly_closely_carelessly
          run: |
            npm install
            timeout 340m node cinema.js
  
